<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BERN-AI — Bisaya AI Chat</title>

    <!-- Set the theme before first paint so there's no flash of the wrong
         color scheme. This has to run inline, before styles.css loads. -->
    <script>
        (function () {
            var stored = null;
            try {
                stored = localStorage.getItem('bernai-theme');
            } catch (error) {
                stored = null;
            }
            document.documentElement.setAttribute('data-theme', stored === 'day' ? 'day' : 'night');
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="code-rain" id="codeRain" aria-hidden="true"></div>

    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Ilisi sa day mode">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
        </svg>
    </button>

    <main class="app">
        <header class="signboard">
            <div class="signboard__plate">
                <span class="signboard__route" aria-hidden="true">12H</span>
                <h1 class="signboard__title">BERN-AI</h1>
                <p class="signboard__dest">Bisaya na AI, tanan pangutana tubagon sa nga binisaya para maka sabot ka.</p>
            </div>
        </header>

        <section class="panel settings" aria-label="Mga setting sa pangutana">
            <div class="settings__grid">
                <div class="field">
                    <div class="field__head">
                        <label for="modelSelect">Pilia ang Modelo</label>
                        <span class="field__hint">libre tanan — walay bayad</span>
                    </div>
                    <div class="select-wrap">
                        <select id="modelSelect" disabled>
                            <option value="">Gina-andam ang lista sa mga libre nga modelo...</option>
                        </select>
                        <svg class="select-wrap__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <div class="model-meta" id="modelMeta"></div>
                    <div class="model-capacity" id="modelCapacity" hidden></div>
                </div>

                <div class="field">
                    <div class="field__head">
                        <label for="langSelect">Pinulongan sa Tubag</label>
                        <span class="field__hint">English ang default</span>
                    </div>
                    <div class="select-wrap">
                        <select id="langSelect"></select>
                        <svg class="select-wrap__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <label class="visually-hidden" for="langCustom">Isulat ang lain nga pinulongan</label>
                    <input type="text" id="langCustom" class="input-field lang-custom" placeholder="Isulat ang pinulongan (e.g. Hiligaynon, Italiano)" hidden />
                </div>
            </div>
        </section>

        <section class="panel" aria-label="Pangutana kang BERN-AI">
            <label class="visually-hidden" for="userInput">Isulat ang imong pangutana</label>
            <div class="composer">
                <input type="text" id="userInput" class="input-field" placeholder="Unsa may imong pangutana?" autocomplete="off" />
                <button type="button" class="btn btn--go" id="askBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M22 2 11 13" />
                        <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
                    </svg>
                    Tubaga
                </button>
                <button type="button" class="btn btn--stop" id="stopBtn" hidden>
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                    Hunong
                </button>
            </div>

            <div class="transit" id="transit" hidden aria-live="polite">
                <div class="transit__track" aria-hidden="true">
                    <svg class="transit__jeep" viewBox="0 0 48 28">
                        <rect x="2" y="7" width="34" height="12" rx="2" />
                        <rect x="28" y="3" width="14" height="10" rx="2" />
                        <circle class="wheel" cx="12" cy="21" r="5" />
                        <circle class="hub" cx="12" cy="21" r="2" />
                        <circle class="wheel" cx="32" cy="21" r="5" />
                        <circle class="hub" cx="32" cy="21" r="2" />
                    </svg>
                </div>
                <p class="transit__label">Nagbiyahe pa ang tubag...</p>
            </div>

            <div id="response" aria-live="polite">
                <p class="ticket__empty">Wala pay pangutana. Sige, sulayi!</p>
            </div>

            <p class="notice" id="errorNote" hidden></p>
        </section>

        <footer class="footer">
            <div class="route-dots" aria-hidden="true">● · ● · ● · ● · ●</div>
            <p>BERN-AI © 2026 — gibuhat sa Cebu 🇵🇭.</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
