<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BERN-AI — Free AI Chat</title>

    <!-- Sets the initial theme + sky position before first paint, so
         there's no flash of the wrong palette. Kept as an external file
         (not inline) so the CSP's script-src can be a strict allowlist
         with no 'unsafe-inline'. See js/themeBootstrap.js. -->
    <script src="js/themeBootstrap.js"></script>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffc22e">
    <meta name="description" content="BERN-AI — free, multilingual AI chat with a jeepney-signboard identity. No sign-up, no cost, your choice of reply language." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="sky" aria-hidden="true"></div>
    <div class="stars" aria-hidden="true"></div>
    <div class="sun-rays" aria-hidden="true"></div>
    <div class="clouds" aria-hidden="true">
        <span class="cloud"></span>
        <span class="cloud"></span>
        <span class="cloud"></span>
    </div>
    <canvas id="codeRain" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>

    <!-- A digital LED readout showing the visitor's resolved local time
         (device timezone, upgraded to their real location if granted —
         see theme.js), styled after the amber dot-matrix destination
         signs jeepneys carry above the windshield. Purely decorative/
         informational and NOT interactive — it's a plain div, not a
         button, and has no click handler. The switch below it is the
         only control, and directly toggles dark mode. Rule: 1AM-5PM ->
         day, 5PM-1AM -> night (see theme.js). -->
    <div class="theme-control">
        <div class="theme-clock" id="themeClock" aria-hidden="true">
            <div class="theme-clock__grille" aria-hidden="true"></div>
            <div class="theme-clock__display">
                <span class="theme-clock__icon">
                    <svg class="theme-clock__icon-glyph theme-clock__icon-glyph--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="4.3" />
                        <path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7" />
                    </svg>
                    <svg class="theme-clock__icon-glyph theme-clock__icon-glyph--moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M20.8 14.7A8.6 8.6 0 0 1 9.3 3.2a8.6 8.6 0 1 0 11.5 11.5Z" />
                    </svg>
                </span>
                <span class="theme-clock__time">
                    <span class="theme-clock__digits theme-clock__digits--hour">12</span><span class="theme-clock__colon" aria-hidden="true">:</span><span class="theme-clock__digits theme-clock__digits--minute">00</span>
                </span>
                <span class="theme-clock__period">AM</span>
            </div>
        </div>
        <label class="theme-mode-switch">
            <input type="checkbox" id="themeModeSwitch" class="visually-hidden" aria-label="Toggle dark mode" />
            <span class="theme-mode-switch__track" aria-hidden="true">
                <span class="theme-mode-switch__thumb"></span>
            </span>
        </label>
    </div>

    <main class="app">
        <header class="signboard">
            <div class="signboard__plate">
                <span class="signboard__route" aria-hidden="true">12H</span>
                <!-- Brand name — intentionally not translated. data-text
                     mirrors the content so the ::after chrome-sheen layer
                     (components.css) can clip its gradient to the same
                     glyphs without duplicating markup. -->
                <h1 class="signboard__title" data-text="BERN-AI">BERN-AI</h1>
                <p class="signboard__dest" data-i18n="signboard.dest"></p>
            </div>
        </header>

        <section class="panel settings" aria-label="Question settings">
            <div class="settings__grid">
                <div class="field">
                    <div class="field__head">
                        <label for="modelSelect" data-i18n="field.model.label"></label>
                        <span class="field__hint" data-i18n="field.model.hint"></span>
                    </div>
                    <div class="select-wrap">
                        <select id="modelSelect" disabled></select>
                        <svg class="select-wrap__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <div class="model-meta" id="modelMeta"></div>
                    <div class="model-capacity" id="modelCapacity" hidden>
                        <span class="model-capacity__label"></span>
                        <div class="capacity-gauge" aria-hidden="true">
                            <div class="capacity-gauge__fill"></div>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <div class="field__head">
                        <label for="langSelect" data-i18n="field.language.label"></label>
                        <span class="field__hint" data-i18n="field.language.hint"></span>
                    </div>
                    <div class="select-wrap">
                        <select id="langSelect"></select>
                        <svg class="select-wrap__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <label class="visually-hidden" for="langCustom" data-i18n="field.language.customPlaceholder"></label>
                    <input type="text" id="langCustom" class="input-field lang-custom" data-i18n-placeholder="field.language.customPlaceholder" hidden />
                </div>
            </div>
        </section>

        <section class="panel" aria-label="Ask BERN-AI">
            <label class="visually-hidden" for="userInput" data-i18n="composer.placeholder"></label>
            <div class="composer">
                <input type="text" id="userInput" class="input-field" data-i18n-placeholder="composer.placeholder" autocomplete="off" />
                <button type="button" class="btn btn--go" id="askBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M22 2 11 13" />
                        <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
                    </svg>
                    <span data-i18n="composer.ask"></span>
                </button>
                <button type="button" class="btn btn--stop" id="stopBtn" hidden>
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                    <span data-i18n="composer.stop"></span>
                </button>
            </div>

            <div class="transit" id="transit" hidden aria-live="polite">
                <div class="transit__track" aria-hidden="true">
                    <svg class="transit__jeep" viewBox="0 0 48 28">
                        <rect x="2" y="7" width="34" height="12" rx="2" />
                        <rect x="28" y="3" width="14" height="10" rx="2" />
                        <circle class="wheel" cx="12" cy="21" r="5" />
                        <circle class="hub" cx="12" cy="21" r="2" />
                        <circle class="wheel" cx="32" cy="21" r="5" />
                        <circle class="hub" cx="32" cy="21" r="2" />
                    </svg>
                </div>
                <p class="transit__label" data-i18n="transit.label"></p>
            </div>

            <div id="response" aria-live="polite">
                <p class="ticket__empty" data-i18n="response.empty"></p>
            </div>

            <p class="notice" id="errorNote" hidden></p>
        </section>

        <footer class="footer">
            <div class="route-dots" aria-hidden="true">● · ● · ● · ● · ●</div>
            <p>BERN-AI © 2026 — <span data-i18n="footer.tagline"></span></p>
        </footer>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
