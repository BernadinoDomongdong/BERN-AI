<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BernardAi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            font-family: 'Roboto', sans-serif;
            color: #fff;
        }
        .navbar {
            margin-bottom: 50px;
            background-color: #2c2c2c;
        }
        .navbar-brand {
            color: #fff;
        }
        .container {
            background: #2c2c2c;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            color: #fff;
        }
        h2 {
            color: #fff;
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 20px;
            background-color: #3c3c3c;
            color: #fff;
            border: none;
        }
        .form-control::placeholder {
            color: #bbb;
        }
        .form-control:disabled {
            opacity: 0.6;
        }
        select.form-control {
            border-radius: 20px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        .model-row {
            margin-bottom: 15px;
        }
        .model-row label {
            font-size: 0.85em;
            color: #bbb;
            margin-bottom: 5px;
            display: block;
        }
        .model-row .model-meta {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }
        .btn-custom {
            background-color: #007bff;
            color: #fff;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 16px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        .btn-custom:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        .btn-custom:disabled {
            background-color: #555;
            transform: none;
            cursor: not-allowed;
        }
        .btn-stop {
            background-color: #dc3545;
            color: #fff;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 16px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        .btn-stop:hover {
            background-color: #c82333;
            transform: scale(1.05);
        }
        #response {
            margin-top: 20px;
            padding: 20px;
            background: #3c3c3c;
            border-radius: 8px;
            min-height: 50px;
            color: #fff;
        }
        #response h3 {
            color: #fff;
            font-size: 1.2em;
        }
        #response strong {
            color: #ffcc00;
        }
        #response ul {
            padding-left: 20px;
        }
        #response li {
            margin-bottom: 5px;
        }
        #response pre {
            color: #fff;
        }
        .footer {
            margin-top: 50px;
            padding: 20px;
            background: #2c2c2c;
            color: #fff;
            text-align: center;
            border-radius: 8px;
        }
        .spinner-border {
            display: none;
            margin-left: 10px;
        }
        #errorNote {
            display: none;
            margin-top: 10px;
            color: #ff8080;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="#">BernardAi</a>
    </nav>
    <div class="container">
        <h2>Ask BernardAi</h2>

        <div class="model-row">
            <label for="modelSelect">Model (free only, loaded live from OpenRouter)</label>
            <select class="form-control" id="modelSelect" disabled>
                <option value="">Loading available free models...</option>
            </select>
            <div class="model-meta" id="modelMeta"></div>
        </div>

        <div class="form-group">
            <input type="text" class="form-control" id="userInput" placeholder="Enter your question" />
        </div>
        <button class="btn btn-custom" id="askBtn" onclick="sendMessage()" disabled><i class="fas fa-paper-plane"></i> Ask!</button>
        <button class="btn btn-stop" onclick="stopRequest()"><i class="fas fa-stop"></i> Stop</button>
        <div class="spinner-border text-success" role="status">
            <span class="sr-only">Loading...</span>
        </div>
        <div id="response"></div>
        <div id="errorNote">
            Note: free models are shared and rate-limited by OpenRouter, so they can be slower or briefly unavailable.
        </div>
    </div>
    <div class="footer">
        &copy; 2026 BernardAi. All rights reserved.
    </div>
    <script>
        let controller;

        // No API key here. The browser only ever talks to our own
        // serverless functions (/api/models and /api/chat), which hold
        // the real key and only ever forward requests to models that are
        // free at the moment the request is made.
        async function loadModels() {
            const select = document.getElementById('modelSelect');
            const meta = document.getElementById('modelMeta');
            const askBtn = document.getElementById('askBtn');
            const errorNote = document.getElementById('errorNote');

            try {
                const res = await fetch('/api/models');
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || ('HTTP ' + res.status));
                }

                const models = data.models || [];
                select.innerHTML = '';

                if (models.length === 0) {
                    select.innerHTML = '<option value="">No free models available right now</option>';
                    meta.textContent = 'OpenRouter has no $0 models listed at the moment. Try refreshing later.';
                    return;
                }

                models.forEach((m) => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.name;
                    select.appendChild(opt);
                });

                select.disabled = false;
                askBtn.disabled = false;
                meta.textContent = models.length + ' free model(s) available right now.';
            } catch (error) {
                select.innerHTML = '<option value="">Could not load model list</option>';
                errorNote.textContent = 'Could not load the free model list: ' + error.message;
                errorNote.style.display = 'block';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput').value;
            const model = document.getElementById('modelSelect').value;
            const responseDiv = document.getElementById('response');
            const errorNote = document.getElementById('errorNote');
            const spinner = document.querySelector('.spinner-border');
            if (!input) {
                responseDiv.innerHTML = 'Please enter a message.';
                return;
            }
            if (!model) {
                responseDiv.innerHTML = 'No model selected yet — wait for the list to finish loading.';
                return;
            }
            responseDiv.innerHTML = '';
            errorNote.style.display = 'none';
            spinner.style.display = 'inline-block';

            controller = new AbortController();
            const signal = controller.signal;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: input, model: model }),
                    signal: signal,
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || ('HTTP ' + response.status));
                }

                const markdownText = data.choices?.[0]?.message?.content || 'No response received.';
                responseDiv.innerHTML = marked.parse(markdownText);
                errorNote.style.display = 'block';
            } catch (error) {
                if (error.name === 'AbortError') {
                    responseDiv.innerHTML = 'Request was aborted.';
                } else {
                    responseDiv.innerHTML = 'Error: ' + error.message;
                    errorNote.textContent = 'Note: free models are shared and rate-limited by OpenRouter, so they can be slower or briefly unavailable.';
                    errorNote.style.display = 'block';
                }
            } finally {
                spinner.style.display = 'none';
            }
        }

        function stopRequest() {
            if (controller) {
                controller.abort();
            }
        }

        loadModels();
    </script>
</body>
</html>
