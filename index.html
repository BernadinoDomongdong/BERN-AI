<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BERN-AI — Free AI Chat</title>

    <!-- Sets the initial theme + sky position before first paint, so
         there's no flash of the wrong palette. Mirrors theme.js's own
         logic (see THEME_BOOTSTRAP_SNIPPET) — kept in sync manually
         since this one script must run standalone, before any module
         loads. -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('bernai-theme');
                if (stored === 'day' || stored === 'night') {
                    document.documentElement.setAttribute('data-theme', stored);
                    document.documentElement.style.setProperty('--sky-t', stored === 'day' ? '1' : '0');
                    return;
                }
            } catch (e) {}
            var h = new Date().getHours();
            var isDay = h >= 6 && h < 18;
            document.documentElement.setAttribute('data-theme', isDay ? 'day' : 'night');
            document.documentElement.style.setProperty('--sky-t', isDay ? '1' : '0');
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="sky" aria-hidden="true"></div>
    <canvas id="codeRain" aria-hidden="true"></canvas>

    <button type="button" class="theme-toggle" id="themeToggle" data-i18n-aria-label="theme.toNight">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
        </svg>
    </button>

    <main class="app">
        <header class="signboard">
            <div class="signboard__plate">
                <span class="signboard__route" aria-hidden="true">12H</span>
                <!-- Brand name — intentionally not translated. -->
                <h1 class="signboard__title">BERN-AI</h1>
                <p class="signboard__dest" data-i18n="signboard.dest"></p>
            </div>
        </header>

        <section class="panel settings" aria-label="Question settings">
            <div class="settings__grid">
                <div class="field">
                    <div class="field__head">
                        <label for="modelSelect" data-i18n="field.model.label"></label>
                        <span class="field__hint" data-i18n="field.model.hint"></span>
                    </div>
                    <div class="select-wrap">
                        <select id="modelSelect" disabled></select>
                        <svg class="select-wrap__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <div class="model-meta" id="modelMeta"></div>
                    <div class="model-capacity" id="modelCapacity" hidden></div>
                </div>

                <div class="field">
                    <div class="field__head">
                        <label for="langSelect" data-i18n="field.language.label"></label>
                        <span class="field__hint" data-i18n="field.language.hint"></span>
                    </div>
                    <div class="select-wrap">
                        <select id="langSelect"></select>
                        <svg class="select-wrap__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <label class="visually-hidden" for="langCustom" data-i18n="field.language.customPlaceholder"></label>
                    <input type="text" id="langCustom" class="input-field lang-custom" data-i18n-placeholder="field.language.customPlaceholder" hidden />
                </div>
            </div>
        </section>

        <section class="panel" aria-label="Ask BERN-AI">
            <label class="visually-hidden" for="userInput" data-i18n="composer.placeholder"></label>
            <div class="composer">
                <input type="text" id="userInput" class="input-field" data-i18n-placeholder="composer.placeholder" autocomplete="off" />
                <button type="button" class="btn btn--go" id="askBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M22 2 11 13" />
                        <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
                    </svg>
                    <span data-i18n="composer.ask"></span>
                </button>
                <button type="button" class="btn btn--stop" id="stopBtn" hidden>
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                    <span data-i18n="composer.stop"></span>
                </button>
            </div>

            <div class="transit" id="transit" hidden aria-live="polite">
                <div class="transit__track" aria-hidden="true">
                    <svg class="transit__jeep" viewBox="0 0 48 28">
                        <rect x="2" y="7" width="34" height="12" rx="2" />
                        <rect x="28" y="3" width="14" height="10" rx="2" />
                        <circle class="wheel" cx="12" cy="21" r="5" />
                        <circle class="hub" cx="12" cy="21" r="2" />
                        <circle class="wheel" cx="32" cy="21" r="5" />
                        <circle class="hub" cx="32" cy="21" r="2" />
                    </svg>
                </div>
                <p class="transit__label" data-i18n="transit.label"></p>
            </div>

            <div id="response" aria-live="polite">
                <p class="ticket__empty" data-i18n="response.empty"></p>
            </div>

            <p class="notice" id="errorNote" hidden></p>
        </section>

        <footer class="footer">
            <div class="route-dots" aria-hidden="true">● · ● · ● · ● · ●</div>
            <p>BERN-AI © 2026 — <span data-i18n="footer.tagline"></span></p>
        </footer>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
